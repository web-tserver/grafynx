<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Grafynx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,700,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fef9ff 0%, #f4f0fa 100%);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      border-radius: 48px;
      padding: 60px 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .error-code {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      color: #ff4d8c;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Clash Display', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    p {
      color: #5b6e8c;
      font-size: 18px;
      margin-bottom: 32px;
    }
    .home-btn {
      display: inline-block;
      background: #ff4d8c;
      color: white;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 18px;
      transition: 0.2s;
      box-shadow: 0 6px 14px rgba(255,77,140,0.3);
      border: none;
      cursor: pointer;
    }
    .home-btn:hover {
      transform: scale(1.02);
      background: #e6396e;
    }
    .nav-links {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .nav-links a {
      text-decoration: none;
      color: #1e293b;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 40px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }
    .nav-links a:hover {
      background: #ff4d8c;
      color: white;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="home-btn">← Back to Home</a>
    <div class="nav-links">
      <a href="/#services">What We Do</a>
      <a href="/#portfolio">Portfolio</a>
      <a href="/#packages">Packages</a>
      <a href="https://wa.me/60199083295">Contact</a>
    </div>
  </div>
</body>
</html>
